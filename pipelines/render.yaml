services:
  - type: web
    name: sheltered-light-ml
    runtime: python
    buildCommand: pip install -r api/requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AZURE_SQL_SERVER
        sync: false
      - key: AZURE_SQL_DATABASE
        sync: false
      - key: AZURE_SQL_USERNAME
        sync: false
      - key: AZURE_SQL_PASSWORD
        sync: false

cron jobs:
  - name: churn-nightly
    runtime: python
    schedule: "0 2 * * *"
    buildCommand: pip install -r api/requirements.txt
    startCommand: python3 jobs/run_churn_inference.py

  - name: readiness-nightly
    runtime: python
    schedule: "10 2 * * *"
    buildCommand: pip install -r api/requirements.txt
    startCommand: python3 jobs/run_readiness_inference.py

  - name: social-nightly
    runtime: python
    schedule: "20 2 * * *"
    buildCommand: pip install -r api/requirements.txt
    startCommand: python3 jobs/run_social_inference.py
